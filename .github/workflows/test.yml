name: CI Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: Test Scripts (${{ matrix.os }})
    strategy:
      matrix:
        # macos-latest uses bash 3.2 by default, ubuntu-latest uses bash 5+
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Create mock environment
        run: |
          mkdir -p ~/.agent-skills
          mkdir -p ~/.claude ~/.gemini ~/.codex ~/.aider ~/.continue
          
      - name: Run Install Script
        run: bash install.sh
        
      - name: Verify Install
        run: |
          test -f ~/.agent-skills/agent-coordination.md
          test -L ~/.claude/agent-coordination.md
          test -L ~/.continue/agent-coordination.md
          
      - name: Run Setup Dev Env Script (All Defaults)
        run: |
          # Pipe blank answers to simulate hitting [Enter] for all 11 defaults
          printf "\n\n\n\n\n\n\n\n\n\n\n" | bash setup-dev-env.sh

      - name: Verify Setup Dev Env
        run: |
          test -f ~/.agent-skills/agent-dev-env.md
          test -L ~/.gemini/agent-dev-env.md
          grep -q "numbered steps" ~/.agent-skills/agent-dev-env.md
          grep -q "Conventional Commits" ~/.agent-skills/agent-dev-env.md
          grep -q "virtual environment" ~/.agent-skills/agent-dev-env.md
          grep -q "pip" ~/.agent-skills/agent-dev-env.md
          grep -q "node_modules" ~/.agent-skills/agent-dev-env.md
          grep -q "npm" ~/.agent-skills/agent-dev-env.md
          grep -q "## Agent Roles & Responsibilities" ~/.agent-skills/agent-dev-env.md
          grep -q "Implementer: Claude Code" ~/.agent-skills/agent-dev-env.md
          grep -q "Reviewer: Codex" ~/.agent-skills/agent-dev-env.md
          grep -q "Must NOT" ~/.agent-skills/agent-dev-env.md
          grep -q "Ready for Reviewer" ~/.agent-skills/agent-dev-env.md
          grep -q "should not disrupt" ~/.agent-skills/agent-dev-env.md
          grep -q "Must NOT implement code" ~/.agent-skills/agent-dev-env.md
          grep -q "Log feedback in" ~/.agent-skills/agent-dev-env.md
          grep -q "hand back to the Implementer" ~/.agent-skills/agent-dev-env.md
          grep -q "Log .Ready for Reviewer. in .agent-actions.md." ~/.agent-skills/agent-dev-env.md

      - name: Run Setup Dev Env Script (Ignore Log)
        run: |
          # Test question 5 'No' answer for .gitignore functionality
          # Setup dummy git config to avoid errors
          git config --global user.email "test@example.com"
          git config --global user.name "Test User"
          printf "a\na\ny\ny\nn\na\na\na\na\n\n\n" | bash setup-dev-env.sh
          GLOBAL_IGNORE=$(git config --global core.excludesfile)
          grep -q "agent-actions.md" "$GLOBAL_IGNORE"

      - name: Run Setup Dev Env Script (Track Log)
        run: |
          # Test question 5 'Yes' answer to verify removal from global gitignore
          printf "a\na\ny\ny\ny\na\na\na\na\n\n\n" | bash setup-dev-env.sh
          GLOBAL_IGNORE=$(git config --global core.excludesfile)
          if grep -q "agent-actions.md" "$GLOBAL_IGNORE"; then exit 1; fi

      - name: Run Setup Dev Env Script (Track Log - XDG fallback)
        run: |
          # Test question 5 'Yes' answer removes from XDG fallback when core.excludesfile is unset
          git config --global --unset core.excludesfile || true
          mkdir -p ~/.config/git
          echo "agent-actions.md" > ~/.config/git/ignore
          printf "a\na\ny\ny\ny\na\na\na\na\n\n\n" | bash setup-dev-env.sh
          if grep -q "agent-actions.md" ~/.config/git/ignore; then exit 1; fi

      - name: Verify Migration Cleanup
        run: |
          # Old agent-git-workflow.md files should not exist after setup-dev-env.sh runs
          test ! -f ~/.agent-skills/agent-git-workflow.md
          test ! -L ~/.claude/agent-git-workflow.md
          test ! -L ~/.gemini/agent-git-workflow.md

      - name: Verify Global Instruction Blocks Are Slim
        run: |
          # All three global files should have the slim structure (no inlined snapshots)
          for f in ~/.claude/CLAUDE.md ~/.codex/AGENTS.md ~/.gemini/GEMINI.md; do
            echo "Checking $f"
            grep -q "### Required Workflow" "$f"
            grep -q "### Source Of Truth" "$f"
            grep -q "ALWAYS read" "$f"
            grep -q "ALWAYS create" "$f"
            if grep -q "Coordination Profile (Managed Snapshot)" "$f"; then
              echo "FAIL: $f still contains coordination snapshot"
              exit 1
            fi
            if grep -q "Development Environment Profile (Managed Snapshot)" "$f"; then
              echo "FAIL: $f still contains dev-env snapshot"
              exit 1
            fi
          done

      - name: Sync AGENTS.md (Create + Check + Idempotence)
        run: |
          TEST_REPO="$(mktemp -d)"

          # Create AGENTS.md from scratch
          bash sync-agents-md.sh --repo "$TEST_REPO"
          test -f "$TEST_REPO/AGENTS.md"
          grep -q "BEGIN MANAGED: agent-coordination" "$TEST_REPO/AGENTS.md"
          grep -q "Development Environment Profile (Managed Snapshot)" "$TEST_REPO/AGENTS.md"

          # Check mode should pass when up to date
          bash sync-agents-md.sh --repo "$TEST_REPO" --check

          # Re-running should preserve non-managed content and remain stable
          printf "\\nCustom notes outside managed block.\\n" >> "$TEST_REPO/AGENTS.md"
          bash sync-agents-md.sh --repo "$TEST_REPO"
          grep -q "Custom notes outside managed block." "$TEST_REPO/AGENTS.md"
          HASH_BEFORE="$(cksum "$TEST_REPO/AGENTS.md" | cut -d' ' -f1,2)"
          bash sync-agents-md.sh --repo "$TEST_REPO"
          HASH_AFTER="$(cksum "$TEST_REPO/AGENTS.md" | cut -d' ' -f1,2)"
          test "$HASH_BEFORE" = "$HASH_AFTER"

      - name: Sync AGENTS.md Check Fails When Outdated
        run: |
          TEST_REPO="$(mktemp -d)"
          bash sync-agents-md.sh --repo "$TEST_REPO"
          awk '{ sub(/Required Workflow/, "Required Workflow BROKEN"); print }' "$TEST_REPO/AGENTS.md" > "$TEST_REPO/AGENTS.md.tmp"
          mv "$TEST_REPO/AGENTS.md.tmp" "$TEST_REPO/AGENTS.md"
          if bash sync-agents-md.sh --repo "$TEST_REPO" --check; then
            echo "expected --check to fail for outdated AGENTS.md"
            exit 1
          fi
          
      - name: Run Uninstall Script
        run: bash uninstall.sh
        
      - name: Verify Uninstall
        run: |
          test ! -f ~/.agent-skills/agent-coordination.md
          test ! -L ~/.claude/agent-coordination.md
          test ! -f ~/.agent-skills/agent-dev-env.md
          test ! -L ~/.gemini/agent-dev-env.md
