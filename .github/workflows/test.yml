name: CI Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: Test Scripts (${{ matrix.os }})
    strategy:
      matrix:
        # macos-latest uses bash 3.2 by default, ubuntu-latest uses bash 5+
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Create mock environment
        run: |
          mkdir -p ~/.agent-skills
          mkdir -p ~/.claude ~/.gemini ~/.codex ~/.aider ~/.continue
          
      - name: Run Install Script
        run: bash install.sh
        
      - name: Verify Install
        run: |
          test -f ~/.agent-skills/agent-coordination.md
          test -L ~/.claude/agent-coordination.md
          test -L ~/.continue/agent-coordination.md
          
      - name: Run Setup Git Workflow Script
        run: |
          # Pipe blank answers to simulate hitting [Enter] for all defaults (a, b, y, y, y)
          printf "\n\n\n\n\n" | bash setup-git-workflow.sh
          
      - name: Verify Setup Git Workflow
        run: |
          test -f ~/.agent-skills/agent-git-workflow.md
          test -L ~/.gemini/agent-git-workflow.md
          grep -q "numbered steps" ~/.agent-skills/agent-git-workflow.md
          grep -q "Conventional Commits" ~/.agent-skills/agent-git-workflow.md
          
      - name: Run Setup Git Workflow Script (Ignore Log)
        run: |
          # Test question 5 'No' answer for .gitignore functionality
          # Setup dummy git config to avoid errors
          git config --global user.email "test@example.com"
          git config --global user.name "Test User"
          printf "a\na\ny\ny\nn\n" | bash setup-git-workflow.sh
          GLOBAL_IGNORE=$(git config --global core.excludesfile)
          grep -q "agent-actions.md" "$GLOBAL_IGNORE"
          
      - name: Run Uninstall Script
        run: bash uninstall.sh
        
      - name: Verify Uninstall
        run: |
          test ! -f ~/.agent-skills/agent-coordination.md
          test ! -L ~/.claude/agent-coordination.md
          test ! -f ~/.agent-skills/agent-git-workflow.md
          test ! -L ~/.gemini/agent-git-workflow.md
